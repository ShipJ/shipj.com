{{ define "main" }}
{{ partial "page-header" . }}
<section id="content-results" class="section pt-4 portfolio-list-page">
  <div class="site-container">
    <div class="pt-6">
      <div class="row">
        {{ range .RegularPages.ByDate.Reverse }}
          <div class="mb-5 md:col-6 lg:col-4">
            {{ partial "components/portfolio-card" . }}
          </div>
        {{ end }}
      </div>
    </div>

  </div>
</section>
{{ end }}
