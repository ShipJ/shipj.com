<footer id="site-footer" class="foot-editorial">
  <div class="site-container">
    <div class="grid items-center gap-x-4" style="grid-template-columns: 1fr auto 1fr;">
      <div class="flex flex-col gap-2 justify-self-start">
        <ul class="social-icons" style="font-family: var(--font-primary); text-transform:none; letter-spacing:0; justify-content:flex-start">
          {{ range site.Data.social.main }}
          <li>
            <a
              target="_blank"
              aria-label="{{ .name }}"
              rel="nofollow noopener"
              href="{{ .link | safeURL }}"
            >
              <i class="{{ .icon }}"></i>
            </a>
          </li>
          {{ end }}
        </ul>
        <span style="font-size: 10px; opacity: 0.6; text-align: center;">© {{ now.UTC.Format "2006" }} · Jack Shipsmith</span>
      </div>
      <ul class="flex flex-wrap items-center justify-center gap-1">
        {{ range site.Menus.footer }}
        <li>
          <a
            class="rounded-full px-3 py-1.5 transition hover:bg-light hover:text-text-dark dark:hover:bg-darkmode-light dark:hover:text-darkmode-text-dark"
            {{ if findRE `^http` .URL }}target="_blank" rel="noopener"{{ end }}
            href="{{ if findRE `^#` .URL }}{{ if not $.IsHome }}{{ site.Home.RelPermalink }}{{ end }}{{ .URL }}{{ else }}{{ .URL | relURL }}{{ end }}"
            >{{ .Name }}</a>
        </li>
        {{ end }}
      </ul>
      <div class="text-right leading-snug">
        <div>last deploy</div>
        <div style="font-size: 10px; opacity: 0.6;">
          {{ now.UTC.Format "02 Jan 2006" }}<br>
          {{ now.UTC.Format "15:04" }} UTC
        </div>
      </div>
    </div>
  </div>
</footer>
