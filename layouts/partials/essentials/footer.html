<footer id="site-footer" class="border-t border-gray-100 py-4 dark:border-darkmode-border">
  <div class="site-container">
    <div class="row items-center gap-y-4">
      <div class="xl:col-3 text-center xl:text-left">
        <!-- navbar brand/logo -->
        <a
          class="navbar-brand inline-block opacity-80"
          href="{{ site.Home.RelPermalink }}"
        >
          Hi, I'm Jack
        </a>
        <p class="mx-auto mt-2 max-w-xs font-primary text-[clamp(0.72rem,0.82vw,0.875rem)] font-normal tracking-wide text-text-light dark:text-darkmode-text-light xl:mx-0">
          Data scientist, engineer, forecaster.
        </p>
      </div>
      <div class="xl:col-6 text-center">
        <ul class="flex flex-wrap items-center justify-center gap-3">
          {{ range site.Menus.footer }}
          <li>
            <a
              class="ui-chip font-primary !text-[clamp(0.72rem,0.82vw,0.875rem)] !font-normal tracking-wide hover:border-primary hover:text-text-dark dark:hover:border-darkmode-primary dark:hover:text-darkmode-text-dark"
              {{
              if
              findRE
              `^http`
              .URL
              }}
              target="_blank"
              rel="noopener"
              {{
              end
              }}
              href="{{ if findRE `^#` .URL }}
                  {{ if not $.IsHome }}
                    {{ site.Home.RelPermalink }}
                  {{ end }}{{ .URL }}
                {{ else }}
                  {{ .URL | relURL }}
                {{ end }}"
              >{{ .Name }}</a
            >
          </li>
          {{ end }}
        </ul>
      </div>
      <div class="xl:col-3 text-center xl:text-right">
        <ul class="social-icons">
          {{ range site.Data.social.main }}
          <li>
            <a
              target="_blank"
              aria-label="{{ .name }}"
              rel="nofollow noopener"
              href="{{ .link | safeURL }}"
            >
              <i class="{{ .icon }}"></i>
            </a>
          </li>
          {{ end }}
        </ul>
      </div>
    </div>
    <div class="pt-4 text-center text-xs text-text-light dark:text-darkmode-text-light">
      <p>{{ site.Params.copyright | markdownify }}</p>
    </div>
  </div>
</footer>
