{{ $reports := first 10 (sort (where site.RegularPages "Section" "in" (slice "portfolio" "blog")) "PublishDate" "desc") }}
{{ if gt (len $reports) 0 }}
<div class="mb-0">
  <div class="ui-card-compact">
    <h5 class="mb-6">Highlights</h5>
    <ul class="space-y-4">
      {{ range $reports }}
      <li>
        <a
          href="{{ .RelPermalink }}"
          class="block rounded-2xl border border-transparent px-3 py-2 transition hover:border-border hover:bg-body dark:hover:border-darkmode-border dark:hover:bg-darkmode-body"
        >
        <span class="block text-sm font-semibold text-text-dark dark:text-darkmode-text-dark">
          {{ .Title }}
        </span>
        <span class="mt-2 block text-xs text-text-light dark:text-darkmode-text-light">
          <i class="fa-regular fa-code-merge mr-2"></i>{{ time.Format ":date_long" .PublishDate }}
        </span>
        </a>
      </li>
      {{ end }}
    </ul>
  </div>
</div>
{{ end }}
