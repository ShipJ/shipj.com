{{ $reports := first 10 (sort (where site.RegularPages "Section" "in" (slice "portfolio" "blog")) "PublishDate" "desc") }}
{{ if gt (len $reports) 0 }}
<div class="mb-0">
  <div class="bg-light dark:bg-darkmode-light rounded p-6">
    <h5 class="mb-6">Highlights</h5>
    <ul>
      {{ range $reports }}
      <li class="mb-3">
        <a
          href="{{ .RelPermalink }}"
          class="block hover:underline"
        >
        <span class="block text-[12px] font-medium">
          {{ .Title }}
        </span>
        <span class="ml-[0.1rem] block text-[10px] font-medium">
          <i class="fa-regular fa-code-merge mr-2"></i>{{ time.Format ":date_long" .PublishDate }}
        </span>
        </a>
      </li>
      {{ end }}
    </ul>
  </div>
</div>
{{ end }}
