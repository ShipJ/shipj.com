<details class="group" data-filter-panel>
  <summary class="flex cursor-pointer list-none items-center gap-2 border-b border-border pb-2 text-text-light dark:border-darkmode-border dark:text-darkmode-text-light">
    <span class="inline-flex items-center gap-2">
      <span class="text-xs font-semibold uppercase tracking-widest text-text-light dark:text-darkmode-text-light">Filters</span>
      <i class="fa-solid fa-chevron-down text-sm transition duration-200 group-open:rotate-180"></i>
    </span>
    <span class="flex min-w-0 items-center gap-1.5">
      <span
        data-active-filters-summary
        class="hidden max-w-[24rem] truncate text-sm font-normal text-text-light underline underline-offset-2 dark:text-darkmode-text-light"
      ></span>
      <button
        type="button"
        aria-label="Reset filters"
        data-clear-filters
        class="hidden items-center text-sm transition"
      >
        <i class="fa-solid fa-xmark relative top-px left-0.5"></i>
      </button>
    </span>
  </summary>
  <div class="mt-4">
    {{ partial "widgets/categories" . }}
    {{ partial "widgets/tags" . }}
  </div>
</details>
