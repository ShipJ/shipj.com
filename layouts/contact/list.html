{{ define "main" }}
{{ partial "page-header" . }}

<section class="section-sm pt-4">
  <div class="space-y-10">

    <!-- Contact Form -->
    <form action="https://formspree.io/f/movkborv" method="POST">
      <input type="hidden" name="_subject" value="Website Contact Form" />

      <div class="site-container mb-4">
        <h4 class="text-text-dark">Drop me an email</h4>
      </div>

      <div class="border-b border-border py-4">
        <div class="site-container">
        <div class="max-w-md space-y-3">
          <input
            id="name"
            name="name"
            class="block w-full px-4 py-3 bg-transparent text-text-dark placeholder:text-text-light border border-border rounded-xl focus:outline-none dark:bg-darkmode-primary dark:text-darkmode-body dark:placeholder:text-darkmode-body/50 dark:border-darkmode-primary"
            placeholder="Your name"
            type="text"
            required
          />

          <input
            id="email"
            name="email"
            class="block w-full px-4 py-3 bg-transparent text-text-dark placeholder:text-text-light border border-border rounded-xl focus:outline-none dark:bg-darkmode-primary dark:text-darkmode-body dark:placeholder:text-darkmode-body/50 dark:border-darkmode-primary"
            placeholder="Your email"
            type="email"
            required
          />

          <textarea
            id="message"
            name="message"
            class="block w-full px-4 py-3 bg-transparent text-text-dark placeholder:text-text-light border border-border rounded-xl focus:outline-none resize-y overflow-auto dark:bg-darkmode-primary dark:text-darkmode-body dark:placeholder:text-darkmode-body/50 dark:border-darkmode-primary"
            placeholder="Your message..."
            rows="3"
            required
          ></textarea>
          <script>
            (function () {
              var t = document.getElementById('message');
              t.style.minHeight = t.offsetHeight + 'px';
            })();
          </script>

          <div class="pt-1">
            <button type="submit" class="btn btn-primary dark:!text-darkmode-body">Send</button>
          </div>
        </div>
        </div>
      </div>
    </form>

    <!-- Booking Widget -->
    <div style="width: 84vw; max-width: 84vw; margin-inline: auto;" class="space-y-4">
      <h4 class="text-text-dark">Or schedule some time</h4>

      <div class="rounded-3xl border border-border overflow-hidden bg-white">
        <iframe
          src="https://calendar.google.com/calendar/appointments/schedules/AcZssZ0IgV3RdHXSqdhFxieEhnkHNS90gXwrcoHuqpikDU4TCfkxxfSOCYzb2zZn8diyG3g9IwONyF_6?gv=true"
          style="border: 0; height: max(900px, calc(100vh - 200px));"
          width="100%"
          frameborder="0"
        ></iframe>
      </div>
    </div>

  </div>
</section>

{{ end }}
